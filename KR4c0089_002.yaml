body:
  text: 笠澤藂書巻二唐陸龜䝉撰寒泉子對秦恵王寒泉子秦之處士對秦恵王曰客有自趙來以約縱連横事説大王者為誰恵王曰東周人蘇秦也寒泉子曰書十上王不聴有之乎曰然其道如何王耶霸耶曰黜其霸以隮王乎曰不然則何上書之煩而用之疎乎恵王曰醯雞不能混雷霆嬰兒不能抗烏獲者響與力懸絶故也蘇子誠辯矣安能以三寸舌謀山東諸侯使西面朝秦者乎寡人非不知不破一領甲不折一隻矢之為利也顧其猶捕風耳諸侯不可以一非一朝也齊桓晉文之伯也始若膠附終若冰拆豈連雞不能俱上於棲而已哉寡人塞耳義弗聞也寒泉子曰不然夫齊荆三晉之人疾於兵久矣方城之金十九為兵一為鏄銚董澤之蒲十九為榦一為箕棬父子兄弟之血前後濺野草齊魂為燕氛趙骨化魏土悽痛之聲入金石出弦匏聞之者悄慼酸屑泣不自禁一旦有人謂曰朝與秦連横暮得帖帖安卧秦亦厭戰雖鼓牙頰未能吞諸侯秦休而强吾亦勇而奮矣設有辯口奚能反覆乎大王不用秦詔一武士斷其頸無令車輪輾關下土使關東諸侯聞其言舍縱散横東向以倍秦大王出則奮氣入則包羞及其殆也捜土地以奉讎國獨不念秦仲之業艱難乎春秋紀事何面目見宗廟恵王卒弗用寒泉子畊於鄙趙即封蘇季子為武安君六國果拒秦秦閉關十五年説鳳尾諾或問予曰鳳尾諾為何等物圖耶書耶對曰予之所聞自晉訖於梁陳已來藩邸之書凡封子弟為王則開府辟僚屬取當時士有學行才藻者中是選其所下書東宫則曰令上書則曰牋諸王下書則曰教上書則曰啟應和文章則曰應令應教下其制一等故也其事行則曰諾猶漢天子肯臣下之奏曰可也鳳尾則所諾牋之文也綷䌨然䙰褷然織為繪莫的知既肯其行必有褒異之辭若今之批荅案晉元帝為瑯邪王時帝美其才令通習外事嘗使批鳳尾諾南齊江夏王鋒降髙帝第十二子甚憐之年五嵗使學鳳尾諾下筆便工帝大悦以玉麒麟賜之終未見其出鳳尾牋當畨薄縷輕其制作想精妙靡麗而非牢固者也殆将五百年必不能保而存之好事者或云識音志妄矣且傳云仲尼在魯與陳有問缶羊楛矢者皆知之及修春秋則逺者略近者詳故曰立於定哀而指隠桓之日逺矣蓋聖人作大典不可不慎則前所傳亦妄矣予學聖人之文者求其誠而已矣又安可詐别數百年前事自以為賢哉君子慎所傳無易螢詩肖翹雖振羽戚促盡疑冰風助流還急烟遮㸃暫凝不須輕列宿纔可擬孤燈莫倚隨家事曾煩下詔徵蟬秖憑風作使全仰栁為都一腹清何甚雙翎薄更無伴貂金換酒并雀畫成圖恐是千年恨偏令落日呼秋熱自昔秋捐扇今來意未衰慇懃付柔握淅瀝待清吹午氣朱崖近宵聲白羽隨惣如南國候無復婕妤悲戰秋辭八月空堂前臨隙荒抽關散扇晨烏未光左右物態森疎强梁天隨子爽騀五可切情慄􅀈軍庸之我當濠然而溝壘然而牆纛然而桂隊然而篁杉巉攢矛蕉摽建常槁艾矢束矯蔓絃張蛙合助吹鳥分啟行若革進而金止固違隂而就陽無何雲顔師風㫖伯蒼茫慘澹隳危摵劃火䝉上焚雨比下棘如濠者注如壘者闢如纛者亞如隊者析如矛者折如常者拆如矢者仆如弦者磔如吹者瘖如行者惕石有髮兮盡纍木具耳兮咸馘雲風雨煙乗勝之勢驕杉篁蕉蔓敗北踣之氣摵天隨子曰吁秋無神則已如其有神吾為爾羞之南北幾圻盜興五朞方州大都虎節龍旗瓦解冰碎𤓰分豆離斧抵耋老干穿乳兒昨宇今燼朝人暮尸萬犢一啗千倉一炊擾踐邊朔殱傷蜑夷制質守帥披攘城池弓弮不刓甲綴不離兇渠歌笑裂地無疑一作宜天有四序秋為司刑少昊負扆親朝百靈蓐收相臣太白将星可霾可雹可風可霆可壍溺顛陷可夭札迷冥曾忘鏖剪自意澄寧苟蜡禮之云責觸天怒而誰丁奈何欺荒庭淩壊砌摋崇虈批宿蕙揭編茅而逞力斷緯蕭而作勢不過約弱欹垂戕殘廢替可謂棄其本而趍其末捨其大而從其細也辭猶未已色若媿耻於是墮者止偃者起復友生論文書辱示近年作者論文書二篇使僕是非得失於其間僕雖極頑冥亦知惴息汗下見詆訶之甚難招禍怨之甚易也況僕少不攻文章止讀古聖人書誦其言思行其道而未得者也每涵咀義味獨坐日昊案上有一盃藜羮如五鼎七牢饋於左右加之以撞金石萬羽蘥也未嘗干有司對問希品苐未嘗厯王公丐貸飾車馬故無用文處江湖間不過美泉石則記之聳節槩則傳之觸離會則序之值巾罍則銘之簡散上聲澹誕無所諱避又安知文之是歟非歟生過聴徳我太甚苟黙黙不應非朋友切切偲偲之義也故扶病把筆一二論之曰我自小讀六經孟軻揚雄之書頗有熟者求文之指趣規矩無出於此及子史則曰子近於經經語古而微史近書書語直而淺所言子近經近何經史近書近何書書則記言之史也史近春秋春秋則記事之史也六籍中獨詩書易象與魯春秋經聖人之手耳禮樂二記雖載聖人之法近出二戴未能通一純實故時有齟齬不安者蓋漢代諸儒争撰而獻之求購金耳記言記事參錯前後曰經曰史未可定其體也案經解則悉謂之經區而别之則詩易為經書與春秋實史耳學者不當混而言之且經解之篇句名出於戴聖耳王輔嗣因之以易為經杜元凱因之以春秋為經孔子曰學詩乎學禮乎易之為書也原始要終知我以春秋罪我以春秋未嘗稱經稱經非是聖人㫖也蓋出於周公謚法經緯天地曰文故也有經書必有緯書聖人既作經亦當作緯譬猶織也經而不緯可成幅乎緯者且非聖人之書則經亦後人名之耳非聖人之㫖明矣苟以六籍謂之經習而稱之可也指司馬遷班固之書謂之史何不思之甚乎六籍之内有經有史何必下及子長孟堅然後謂之史乎孔子曰吾猶及史之闕文也又曰質勝文則野文勝質則史又曰董狐古之良史也此則筆之曲直體之是非聖人悉論而辯之矣豈須班馬而後言史哉以詩易為經以書春秋為史足矣無待於外也謂經語古而皆微則易曰履霜堅冰至初筮告再三凟凟則不告苦節不可貞之類果純古而微乎謂史語直而淺則春秋書考仲子之宫初獻六羽及齊師戰于乾時我師敗績辛巳有事于太廟仲子遂卒于陲壬午猶繹萬入去蘥之類果純直而淺乎經不純微史不純淺又可見也言文之不可立諭則曰春秋不當言無使滋蔓又云春秋舉軍旅會盟皆非叙事耶引左氏傳語徵左氏敘事悉謂之春秋可乎春秋大典也舉凡例而褒貶之非周公之法所及者酌在夫子之心故游夏不能措一辭若區區於敘事則魯國之史官耳孰謂之春秋哉前所謂自小讀六經頗有熟者求文之㫖趣規矩不出於此妄矣又一篇云某文也某辭也文既與辭異是文優而辭劣耳何易之繫辭曰齊大小者存乎卦辯吉凶者存乎辭故卦有大小辭有險易又曰觀其彖辭則思過半矣易之辭非文耶書載帝庸作歌皋陶賡載歌又歌五子之歌皆辭也書之辭非文耶屬辭比事春秋教也春秋之辭非文耶禮有朝聘之辭娶夫人之辭樂有登歌薦之辭禮樂之辭非文耶法言曰楊墨塞路孟子辭而闢之廓如也孟軻之辭非文耶太𤣥之辭也沉以窮乎下浮以際乎上揚雄之辭非文耶是知文者辭之惣辭者文之用天之将喪斯文也天之未喪斯文也不當稱辭吉人之辭寡躁人之辭多不當稱文文辭一也但所適有宜耳何異塗云云哉又曰聲病之辭非文也夫聲成文謂之音五音克諧然後中律度故舜典曰詩言志歌永言聲依永律和聲聲之不和病也去其病則和和則動天地感鬼神反不得謂之文乎猶繪事組繡中有精妍耳大凡解人之説不敢避墉垣膚爪而自矜於堂奥心府也要在引學者當知之事以明之而已矣師道不行後生多縱游於所習有陷而溺者力能援之可也如或不同請觀過而後罰冶家子言武王既伐殷懸紂首有泣於白旗之下者有司責之其人曰吾冶家孫也數十年間再易其鎔範矣今又将易之不知其所業故泣吾祖始鑄田器嵗東作必大售殷賦重秉耒耜者一墢不敢起吾父易之為工器屬宫室臺榭侈其售益倍民彫力窮土木中輟吾易之以為兵器會諸侯伐殷師旅戰陳興其售又倍前也今周用鉞斬獨夫四海将奉文理吾之業必壊吾亡無日矣武王聞之懼於是包干戈勸農事冶家子復祖之舊送豆盧處士謁宋丞相序龜䝉讀揚雄所為書知太𤣥準易法言準論語晚得文中子王先生中説又知其書與法言相類道之始塞而終通子雲軌範不足當也何者子雲事於西漢末屬莽賢用事時皆進苻命取寵雄獨黙黙以窮愁著書病不得免人希至其門止一侯巴從之受太𤣥法言而已文中子生於隨代知聖人之道不行歸河汾間修先生之業九年而功就謂之王氏六經門徒弟子有若鉅鹿魏公清河房公京兆杜公代郡李公咸北面稱師受王佐之道隨亡文中子沒門人歸于唐盡發文中子所授之道左右其治文帝每歎曰魏徵教我功業如此恨不使封徳彞見之逯今十八聖舉其君必曰太宗舉其相必曰房魏上下之心耻不及貞觀則生人受賜足矣豈非文中子之道始塞而終通乎丈人文中子外諸孫也誦文中子書不絶於口率兄弟耕稼以自給一旦訪龜䝉曰吳中兵荒來人不足犬豕之食安能遂退藏耶吾從子相天下矣吾西而見之龜䝉曰丈人外族之門人實作良輔今復家有丞相必以房魏之道致君中興是内外有徳於四海也此行徒東歸乎昔丞相未升甲科時年纔出弱冠龜䝉幸得㕘游中以兄弟之許與膠固形於歌詠及丞相為朝鉅儒居侍從之列龜䝉江湖邊病不能起一耒而畊一船而漁有文三十編有書數千幖未嘗干東諸侯故沒沒無一人道著名字今丞相方築太平之基架羣材立清廟丈人承間宴語幽仄試丞相意復念以小社城北秋霖聲髙中夜對榻有苦吟生耶因丈人之行敘房魏得王佐之道丞相追貞觀之風小子復言曩日之分雜而書之用以為送中秋待月轉缺霜輪上轉遲好風偏似送佳期簾斜樹隔情無限燭暗香殘坐不辭最愛笙調聞北里漸看星澹失南箕何人為校清涼力未似初圓欲午時記稻鼠乾符已亥嵗震澤之東曰吳興自三月不雨至於七月當時汙坳沮洳者埃壒塵勃濯檝支派者入戽屢無所汙農民轉逺流漸平聲稻本晝夜如乳赤子欠欠然救渴不暇僅得葩拆穂結十無一二焉無何羣鼠夜出齧而僵之信宿食殆盡雖廬守版擊敺而駭之不能勝若官督户責不食者有刑當是而賦索愈急棘戒束榜箠木肌體者無壯老吾聞之於禮曰迎猫為食田鼠也是禮缺而不行久矣田鼠知之後歟物有時而暴歟政有貪而廢歟國語曰吳稻蟹不遺種豈吳之土鼠與蟹更伺其事而効其力殱其民歟且魏風以碩鼠刺重斂碩鼠刺其君也有鼠之名無鼠之實詩人猶曰逝将去汝適彼樂土況乎上捃其財而下啗其食率一民當二鼠不流浪轉徙聚而為盜何哉春秋螽蝝生大有年皆書是聖人於豐凶不隠之驗也余學春秋又親䝉其灾於是乎記蠧化橘之蠧大如小指首負特角身蹙蹙然類蝤蠐而青翳葉仰齧飢蚕之速不相上下人或棖觸之輒奮角而怒氣色桀驁一旦視之凝然弗食弗動明日復往則蛻為蝴蝶矣力力拘拘其翎未舒襜黑韝蒼分朱間黄腹填而椭堕緌纎且長如醉方寤羸枝不揚又明日往則倚薄風露攀縁草樹聳空翅輕瞥然而去或隠蕙隙或留篁端翩旋軒虛颺曳紛拂甚可愛也須臾犯蝥網而膠之引絲環緾牢若拲梏人雖甚怜不可解而縱矣噫秀其外類有文也嘿其中類有徳也不朋而游類潔也無嗜而食類㢘也向使前不知為橘之蠧後不見觸蝥之網人謂之鈞天帝居而來今復還矣天下大橘也名位大羽化也封略大蕙篁也苟滅徳亡公崇浮飾傲榮其外而枯其内害其本而窒其源得不為大蝥網而膠之乎觀吾之蠧化者可以惕惕登髙文金行髙窮日御初九桐隂雨壓乎泥沙菊氣風揚乎戸牖寒無以衣病不得酒茫洋於心噎嗢在口稚子拱而進曰古往滔滔人生實勞或暇或逸以嬉以遨兹辰甚良足肖吾曹趍山選臺席餌樽醪既可逭乎灾眚亦聊釋乎鬱陶齊諧之流載此世所謂夫登髙者也嘗有意乎予曰吁稚子之知於是耳曾不探乎奥㫖吾數畝之間門常晝關學無端倪宛若循環時孤笑以獨憤樂正直而非險艱為書摭之與善治音持頑有行同而跡類者尚憤疾乎聲顔一驥在坂百駑在閑傳嘶振秣侮病擠孱仲尼登東山而小魯況肆逺目而務周旋者哉陽専奥邃假竊名器有土有人前呵後騎佞舌咿啞所向上下鏜威介私放蕩哆哆如此者又欲見耶崇閎大居塈粉塗朱脊會螭屹扉環獸鋪輪鮮蹄驕羽翼成徒繡碧其内絲篁彼姝主張何人庸兒賈夫如此者又欲見耶纓弁外飾悔咎中積簡弃信行附比凶徳仁澤乾枯義路填塞權之所憎始厚終斥權之所怜昨罵今惜反掌北面天遼海隔如此者又欲見耶國金鑄兵赤子聚盗煞人無慚罪人何躁造化不象名稱同暴以隳牆垣不填堂奥生靈幾何過半減耗殘存伶俜輸輓犒勞羸豪偏頗役使顛倒鄉敺吏笞不舍童耄如此者又欲見耶古所謂登髙能賦者賦物之姿慘戚在下吾寧忍欺爾以灾眚可逭鬱陶可披我中去時病言開怒隨我感物悴遐瞻邇噫是使灾眚彌熾鬱陶愈悲惟爾教我百無一宜我榖未實我蔬未肥弗視農圃吾将曷歸無重我悔吾方憒憒稚子不樂惴縮而退送小雞山樵人序小雞山在震澤西出吳骨門背朝日行四十里得野步市曰光福光福西五里得土山山土多石寡無大林木率生小櫟樸樕皆薪材直吳之爨此為助焉連延廣袤不一其主為言畫疆界以相授自冢至麓凡二百弓東北倍髙而加半焉余所置多少如此予家大小之口二十月費米十斛飯成理魚蔌輩十解薪然後已四時賔祭沐浴澣濯疾病湯藥糜粥在外嵗入五千束足矣其掌而供事以顧及小雞之樵甿也乾符六年春弗雨夏支流将絶八月暴雨而巨艑可實而行之矣九月朔方置薪二百五十於門召而責之曰吾一夏來撤敗屋拔庭草以炊雨之明日望爾來矣何數㢘而至晚得非赭吾山而為汝之利耶吾而欺如名惡何及笑曰吾年餘八十矣元和中嘗從吏部遊京師人言國家用兵帑金窖粟不足用當時江南之賦已重矣迨今盈六十年賦數倍於前不足之聲聞於天下得非専地者之欺甚乎吾有丈夫子五人諸孫亦有丁壯者自盜興以來百役皆在亡無所容又水旱更害吾稼未即死不忍見兒孫寒餒之色雖盡售小雞之木不足以濡吾家矧一二買名為偷乎今子一煬竈不給而責吾之深吾将欲移其責於天下之守則吾死不恨矣予歎之曰汝之言信也然不當發於予汝姑歸與之酒繼之以歌云長其􅊑兮利其斧輸予薪兮勿予侮田予登兮榖予庾突晨烟兮蓬縷縷忩有明兮編有古飽而安兮惟編是伍時不用兮吾無汝撫哀茹筆工夫子之肱力一作兮何緜緜耕不能耒漁不能船截筠束毫既勝且便晝夜今古惟毫是鐫爰有茹夫工之良者責其精觕在價髙下缺齧又互尚不能捨旬濡數鋒月秃一把編如蚕挐女加反説文云持也汝寔助也我書奇奇渾元未衰惟汝是賴如何已而有千萬拔毛止皮散澀鈍鋩緡觚獄辭圓而不流銛而不欺在握方染亦茹之為斵輪運斤傳之者誰毫健身殞吾寧不悲一本悲作噫祭梁鴻墓并序梁伯鸞墓在吳西門金昌亭下幾一里余過之作文而弔以酒為奠其辭曰先生為五噫之歌漢天子聞而病之南走乎大江之波客皋氏之宇下志沉潛而靡他自吳粲以舉臼夫人之勤亦多不懐志於将沒適乎道之無頗比要離之烈魄冡雖夷而不磨嗟余後先生之千祀聊奉奠而來過俯灌地而仰語顧先生之謂何心𥚹性誕客他人之宇下不得故築垣而自翰身病妻弱自吳民之粲不得故力耕而自穫所以法先王之義者庶五噫之可作紀錦裙蜀本作記錦裙侍御史趙郡李君好事之士也因予話上元瓦官寺有陳後主羊車一輪天后武氏羅裙佛旛皆組繡奇妙李君乃出古錦裙一幅示余幅長四尺下廣上狹下濶六寸上減下三寸半皆周尺如直其前則有鶴二十勢若飛起率曲折一脛口中銜莩葩背有一鸎鵡聳肩舒毛數與鶴相等二禽大小不類而隔以花卉均布無餘地界道四向五色間雜道上累細鈿㸃綴其中微雲鎖結互以相帶有若駮霞殘虹流烟堕霧春草夾逕逺山截空壊牆古苔石泓秋水印丹浸上聲漏蘂粉塗染盩縆公曾切急也䭾疾也或作桓環珮雲隠涯岸濃淡霏拂靄抑冥密始如不可辨别及諦視之條段斬絶分畫一一有去處非繡非繪縝緻柔美又不可狀也裏有繒綵下制綫尚仍舊兩旁皆解散蓋拆減零落僅存此故耳縱非齊梁物亦不下三百年矣昔時之工如此妙耶曳其裾者復何人焉因筆之為辭繼于錦譜之後俾善詩者賦之紫溪翁并序紫溪翁過甫里先生舉酒相屬醉而歌曰一邱之木其栖深也屋吾容不辱一溪之石其居平也席吾勞以息一竇之泉其音清也弦吾方在懸得乎人得乎天吾不知所以然而然先生弁而賡之曰採江之魚兮朝船有鱸採江之蔬兮暮筐有蒲左圖且書右琴與壺夀歟夭歟貴歟賤歟歌闋而去笠澤藂書巻二
