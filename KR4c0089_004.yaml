body:
  text: 笠澤藂書卷四唐陸龜䝉撰村夜二篇江上冬日短徘徊草堂暝鴻當絶塞來客向孤村病綿綿起歸念咽咽興微詠菊徑月方髙橘齊霜已併盤餐蔬粟粗史籍籖牌盛目冷松桂寒耳喧兒女競開瓶浮蟻緑試筆秋毫徑晝户亦重關寒屏遞相映詩從騷雅得字費鉛槧正遇敵舞蛇矛逢談捉犀柄無名升甲乙有志扶荀孟守道希昔賢為文通古聖幽憂廢長劒憔悴慙清鏡秪㑹魚鳥情詎知時俗性浮虛多徇勢老懶徒歷聘既不務人知空餘樂天命吾家在田野家事苦遼敻耕稼一以微囷倉自然罄愁㦗風葉亂獨坐燈花迸明發成浩歌誰能少傾聽其二世既賤文章㱕來事耕稼伊人著農道亢倉子有農道篇我亦賦田舍所悲勞者苦敢用辭為詫秪效芻牧言誰防輕薄罵嘻今居寵祿各自矜雄霸堂上考華鐘門前竚髙駕纎洪動絲竹水陸供膾炙小雨靜樓臺微風動蘭麝吹噓川可倒眄睞花爭姹萬户膏血窮一筵歌舞價安知勤播植卒嵗無間暇種以春鳸音扈初穫從秋隼下専専望穜稑搰搰條桑柘日晏腹未充霜繁體猶裸平生守仁義所疾唯狙詐上誦周孔書沈溟至酣藉豈無致君術堯舜不上下豈無活國方頗牧齊教化蛟龍任乾死雲雨終不借羿臂束如囚徒勞誇善射才能誚箕斗辨可移嵩華若與氓輩量飢寒殆相亞長吟倚清瑟孤憤生遙夜自古有遺賢吾容遍稱謝紀事本作漁釣徒心將遂踈放苦為飢寒纍未得恣間暢去年十二月身往霅溪上病裏賀豐登雞豚聊饋餉巍峩卞山雪凝冽不可向瘦骨倍加寒徒為厚繒纊晴來露青靄千仞缺尋丈卧恐玉華銷時時推枕望雖然榮衛困亦覺精神王把筆強題詩粗言瓌怪狀吳興鄭太守文律頗清壯鳳尾與鯨牙紛翍落新唱緘書寄城內搪突無以況料峭採蓮船縱橫簸天浪方傾謝公詠忽值莊生喪鄭員外仁規是年受代俄喪偶默默阻音徽臨風但惆悵春㱕殆秋末固自嬰微恙嵗晏弗躬親何由免欺誑今來觀刈穫乃在松江並步浪反門外兩潮過波瀾光蕩漾都緣新卜築是事皆草創爾後如有年遂應愜微尚天髙氣候爽野迥襟懷曠感物動牢愁憤時頻骯口浪切髒子浪切平生樂篇翰至老安敢忘駿骨正牽鹽𤣥文終覆醬唴今多赤舌見善唯蔽謗忖度大為防涵容寬作量圖書筐簏外關眼皆䞉長餓𨽻不勝無薄田家所仰稍離飢寒患學古真可強聖道庶經營世途多踉蹌近聞天子詔復許私醖釀趨促使舂酒材呼兒具盆盎宵長擁吟褐日晏開書幌我醉卿可還陶然似元亮孤雁篇我生天地間獨作南賔雁哀鳴慕前侣不免飲啄晏雖䝉小雅詠未脫魚網患況是摽禮經憂為弋者篡晴鳶爭上下意氣苦凌􅀈吾常嚇鴛爾輩何足訕回頭語晴鳶汝食腐鼠慣無異駑駘羣戀短頭皂棧豈知瀟湘岸葮菼蘋萍間有石形狀竒寒流古來灣間看甪里志了不憂芻豢世所重巾冠何妨野夫丱騷人誇蕙芷易象取陸莧漆園逍遙篇中亦載尺鷃汝惟才性下嗜好不可諫身雖慕髙翔糞壤是盼盼或聞通鬼魅怪崇立可辨硩簇書兩存寧容恣妖幻硩簇周禮秋官司寇下硩簇氏掌覆天鳥之巢硩鄭司農讀為擲又他歷反簇讀為爵簇之簇謂巢也南涇漁父豫方任踈慵地僻即所好江流背村落偶往心已嫪力報切田家相去逺岑寂且縱慠出户手先笻見人頭未帽南涇有漁父往往攜稚造問其所以漁對我真道蹈吾初簎魚鱉童丱至于耄窟穴與生成自然通壼奧孜孜吾屬天物不可暴大小參去留候其孳養報終朝獲漁利魚亦未嘗耗同覆天地中違仁辜覆幬余觀為政者此意諒難到民皆死搜求莫肯興愍悼今年川澤旱前嵗山源潦牒訴已盈庭聞之類禽噪譬如豢雞鶩豈不容乳抱孟子譏宋人非其揠苗躁吾嘉漁父㫖雅叶賢哲操儻遇採詩官斯文誠敢告野廟碑碑者悲也古者懸而窆用木後人書之以表其功德因留之不忍去碑之名由是而得自秦漢以降生而有功德政事者亦碑之而又易之以石失其稱矣余之碑野廟也非有政事功德可紀直悲夫氓竭其力以奉無名之土木而已矣甌越間好事鬼山椒水濵多淫祀其廟貌有雄而毅黝而碩者則曰將軍有溫而願哲而少者則曰某郎有媪而尊嚴者則曰姥有婦而容豔者則曰姑其居處則敞之以庭堂峻之以陛級左右老木攢植森拱蘿蔦翳於上梟梟室其間車馬徒𨽻藂雜怪狀農作之氓怖之走畏恐後大者椎牛次者擊豕小不下雞犬魚菽之薦牲酒之奠缺於家可也缺於神不可也一日懈怠禍亦隨作耄孺畜牧栗栗然疾病死喪氓不曰適丁其時耶而自惑其生悉歸之神雖然若以古言之則戾以今言之則庶乎神之不足過也何者豈不以生能禦大灾捍大患其死也則血食於生人無名之土木不當與禦灾捍患者為比是戾於古也明矣今之雄毅而碩者有之溫願而少者有之升階級坐堂莚耳絃匏口梁肉載車馬擁徒𨽻者皆是也解民之懸清民之暍未嘗術於胸中民之當奉者一日懈怠則發悍吏肆淫刑驅之以就事較神之禍福孰為輕重哉平居無事指為賢良一旦有大夫之憂當報國之日則佪撓脆怯顛躓竄踣乞為囚虜之不暇此乃纓辨言語之土木耳又何責其真土木耶故曰以今言之則庶乎神之不足過也既而為詩以亂其末土木其形竊吾民之酒牲固無以名土木其智竊吾君之祿位如何可議祿位頎頎酒牲甚微神之饗也孰云其非視吾之碑知斯文之孔悲怪松圖贊并序有道人自天台來示豫怪松圖披之甚駭人目盤於巖穴之內輪囷逼側而上身大數圍而髙不四五尺礧洛罪切碋力可切然蹙縮然幹不暇枝枝不暇葉有若龍彎虎跛壯士囚縳之狀道人曰是何物怪之如是耶子能辨之乎豫曰草木之生安有怪耶苟肥瘠得於中寒暑均於外不為物所凌折未有不挺而茂者也矧松柏乎今不幸出於巖穴之內脞脆者則硜然其牙伏死其下矣何自奮之能為是松也雖稚氣初拆而正性不辱及其壯也力與石鬭乘陽之威悲已之軋拔而將升卒不勝其壓擁勇鬱遏坌憤激訐然後大醜彰於形質天下指之為怪木吁豈異人乎哉天之賦才之盛者早不得用於世則復而不舒薰蒸沈酣日進其道權擠勢奪卒不勝其厄號呼呶拏發越赴訴然後大竒於文彩天下指之為怪民鳴呼木病而後怪不怪不能圖其真文病而後竒不竒不能駭於俗非始不幸而終幸者耶道人曰然為我贊之贊曰松生隂隘巖獄穴械病乎不快卒以為怪擁腫支離神羞鬼疑道人嗟咨援筆傳竒或怪其形或竒於辭自為怪魁是以贊之重憶白菊我憐貞白重寒芳前後藂生夾小堂月朵暮開無絶艷風莖時動有竒香何慙謝雪清才詠不羡劉梅貴主粧更憶幽忩凝一夢夜來村落有微霜别墅懷歸二首水國初冬和暖天南榮方好背陽眠題詩朝憶復暮憶見月上弦還下弦遙為晚花吟白菊近炊香稻識紅蓮何人授我黃金百買取蘇君負郭田東去滄溟百里餘㳂江潮信到吾廬就中家在蓬山下一日堪憑兩寄書丁隱君歌并序隱君姓丁氏字翰之濟陽人也名飛舉讀老子莊周書善養生能鼓琴居錢塘龍泓洞之左右或曰憩館耳别業在深山中非得得行不可適到其下畜妻子事耕稼如常人余嘗南浮桐江途而詣龍泓憩館獲見綸巾布裘貌古而意淡好古文樂聞歌詩見待加厚因曰他時願為山中僕丁笑而不應問之年曰七十二當咸通丙午嵗逮十四年矣雷平道士葛參寥話與翰之熟至今齒髮不衰氣力益壯疏繁道䝉灌溉銼㓢皆自執綆缶斤􅓯輩升髙望逺不翅履平地時峕書細字作文紀事皆有楷法意義夜半山靜取琴彈之奏雅弄一二而已少睡寡言語與人相接禮簡而情至周旋纍年未嘗有罷倦之色不唯疾病也非養生之效歟又不見有所服餌或問之對曰治心修身之外復有何物豫始嘉其遁世又聞其老而益精又說其治心修身之說孔子所謂樂而夀者斯人也歟既樂而夀則仁智充乎其內充乎其內者非有德者歟有德而不耀於世者非隱君子歟乃作丁隱君歌以寄其聲云華陽道士南遊歸手中半卷青蘿衣自言逋客持贈我乃是錢塘丁翰之連江大抵多竒岫獨話君家最竒秀盤燒天竺春笋肥琴倚洞庭秋石瘦草堂暗引龍泓溜老樹根株若蹲獸霜濃果熟末容收往往兒童雜猿狖去嵗猖狂有黃冦官軍解散無人鬭滿城奔迸翰之間只把枯松塞圭竇前度相逢正賣文一錢不直虛云云今來利作採山斧可以拋身麋鹿羣丁隱君丁隱君叩頭且莫别名氏即日更尋丁隱君蟹志蟹水族之微者其為蟲也有藉見於禮經載於國語揚雄太𤣥辭晉春秋勸學等篇考於易象為介類與龜與鱉剛其外者皆乾之屬也周公所謂旁行者歟參於藥録食疏蔓延乎小說其智則未聞也唯左氏紀其為灾子雲譏其躁以為郭索後引而已蟹始窟穴於沮洳中秋冬交以大出江東人云稻之登也率執一穗以朝其魁然後從其所之蚤夜觱沸指江而奔漁者緯蕭承其流而障之曰蟹斷煆斷短其江之道焉爾然後扳援越軼遁而去者十六七既入於江則形質寖大於舊自江復趨於海如江之狀漁者又斷而求之其越轍遁去者又加多焉既入於海形質益大海人亦異其稱謂矣嗚呼穗而朝其魁不近於義耶捨沮洳而之江海自微而務著不近於智耶今之學者始得百家小說而不知孟軻荀揚氏之道或知之又不汲汲於聖人之言求大中之要何也百家小說沮洳也孟軻荀揚氏聖人之瀆也六籍者聖人之海也苟不能捨沮洳而求瀆由瀆以至於海是人之智反出於水蟲下能不悲夫吾是以志其蟹鶴媒歌偶繫漁舟汀樹枝因看射鳥令人悲盤空野鶴忽然下背翳見媒心不疑媒間靜立如無事清唳時時入遙吹徘徊未忍過南塘且應同聲就同類梳翎宛若相逢喜秪怕才來又驚起窺鱗啄藻乍低昻立定當胸流一矢媒歡舞躍勢離披似諂功能邀弩兒雲飛水宿各自物妬侣害羣猶爾為而況人間有名利外頭笑語中猜忌君不見荒陂野鶴陷良媒同類同聲真可畏求志賦并序孔子曰吾志在春秋豫以求聖人之志莫尚乎春秋得文通陸先生所纂之書伏而誦之作求志賦語稱人之所好必舉嗜欲以為志余之生也百無一厚者唯古學庶幾乎可媚嗚呼師道之不存安能盡識乎疑義樂夫夫子之春秋病三家之若讐得郯趙疏鑿之與損益然後知微㫖之可求乃服膺而誦之見聖人之逺猷長風廓其羣翳􅀢日臨乎大幽又似車堅馬良善御者涉乎康莊髙帆巨舟工泛者順其安流如魚之就貫如繭之獲抽伊尹和齊於五鼎箕子區分乎九疇酌大中於萬古偉聖心之獨斷宜乎沮齊侯於夾谷斬正卯於兩觀溝公墓以掩廢逐隳私城而防僭亂用千載之遺法發一辭而可判況先生之指歸屹波濤而畔岸雖戅昧而不開亦思之而過半范武子曰君子之於春秋也沒身而已矣吾謂斯言之不誕村中晚望抱杖柴門立江村日易斜雁寒猶憶侣人病更離家短鬢看成雪雙眸舊有花何須萬里外即此是天涯寄淮南鄭竇書記記室千年翰墨孤唯君才學似應徐五丁驅得神功盡二酉搜來祕檢疏煬帝帆檣留澤國淮王箋奏入班書清詞醉草無因見但釣寒江半尺魚江墅言懷病身兼稚子田舍劣相容跡共公卿絶貧須稼穡供月方行到閏霜始近來濃樹少棲禽雜村孤守犬重汀洲藏晚弋籬落露寒舂野辨欹還整家書拆又封杉篁宜夕照忩户憶疏鐘南北唯聞戰縱橫未勝農大春雖苦學叔夜本多慵直使貂裘弊猶堪過一冬自和次韻命既時相背才非世所容著書糧易絶多病藥難供夢為懷山數愁因忌酒濃鳥媒呈不一魚寨下仍重晚桁蓑兼褐晴簷織帶舂著籖分水味標石認田封此地家三户何人祿萬鍾草堂聊當貴金穴任輕農把釣竿初冷題詩筆未慵莫憂寒可晚江上少嚴冬野井珠閣前頭露井多碧梧桐一本作桃花下美人過寒泉未必能如此奈有銀瓶素綆何問吳宫辭并序甫里之鄉曰吳宫在長洲菀東南五十里非夫差所幸之别館耶披圖籍不見其說詢故老不得其地其名存其跡滅悵然興懷古之思作問吳宫辭云彼吳之宫兮江之那涯復道盤盤兮當髙且斜波搖疏兮霧濛箔菡萏國一作圓兮鴛鴦家鸞之簫兮蛟之琴瑟駢筠參差兮界絲密宴曲房兮上初日月落星稀兮歌酣未畢越山藂藂兮越溪疾美人雄劒兮相先後出大姑蘇兮小長洲此宫之麗兮留乎不留霜氛重兮孤榜曉逺樹枯疏兮愁烟悄眇欲托愁烟兮問故基又恐愁烟兮推白鳥水國詩水國不堪旱斯民生甚微直至葮菼少敢言魚蟹肥我到荒村無食啖對案又非謝梁覽況是乾苗結子疏歸時秪得藜羹糝彼農詩四言二首世路澆險淳風蕩除彼農家流猶存厥初藳焉而席茨焉而居首亂如葆形枯若腒大耋既鮐童子未音魚以負以載悉薅悉鉏我慕聖道我耽古書小倦於學時遊汝廬有飯一盛莫鹽莫蔬有繻一緹不襟不袪所謂飢寒汝何逭歟禹貢厥田上下各異善人為邦民受其賜去年西成野有遺穗今夏南畝旱氣赤地遭其豐凶槩斂無二退輸弗供進訴弗視號於旻天以血為淚孟子有言王無罪嵗詩之窮辭以嫉捍吏小雪後書事時候頻過小雪天江南寒色未曽偏楓汀尚憶逢人别麥壠唯憑缺雉眠更擬結茅臨水次偶因行樂到村前鄰翁意緒相安慰多說明年是稔年南征丞相南征定有無幕中誰是騁良圖遙知賊膽縱橫破繞帳生􅙈一萬株北渡江客柴門枕浪花鳴機寒櫓任謳鴉輕舟過去真堪畫驚起鸕鷀一陳斜夜泊詠棲鴻可憐霜月暫相依莫向衡陽趂逐飛同是江南寒夜客羽毛單薄稻梁微早行氷寒孤棹觸天文直似乘槎去問津縱使碧虛無限好客星名字也愁人㮋李花賦乾苻三年作試問花翁得㮋李之春藂移來砌下出自山中長霑澗雨迥灑巖風曽不得次玉堂而展低艷承畫閣而逞微紅虛在芳菲之數徒干造化之功弱植欹危繁梢襞積一枝上能萬其膚萼一萼中自參其丹白且桃以夭而蕣以華芍藥為贈兮芙蓉可嘉誰為剪緗綺碎明霞鳳葆楤櫳於水殿霓襟掩苒於雲車靜倚庭楹徐飄蕊氣落幽閨怨别之夢寫空谷遺榮之思初侍東陵聖母冶態嫣妍近辭北燭仙人愁容委墜嗟其結莓苔之地抱林麓之姿蝶善舞而相略鶯能言而見欺香憐墜少蒂戀飄遲當杯者不顧守道者應知請看嵇康髙士傳莫信長安輕薄兒送侯道士還太白山序侯生嘗應舉名肜作七言詩甚有態度不見十年自云載貢於有司藝不中度輒得黜齟齬不與世合去入老子法中作道士更名雲多居太白山在雍西南梁州之地苦寒霜雪常積雖夏五六月􅀢日在上羣峯若焚我獨皓然玉聳巖壁澗壑之木不數百年不能為材及其堅良不與他等民乘是氣皆夀而不衰況養生者耶吾南逰天台既將復而老焉豫曰夫物命乎天者人不能有存乎人者天不能奪推其氣則謂之一考其命則有懸絶不類者焉居恆寒之地而不夭者吾不信也處恆燠之地而不夀者吾不信也信其命乎天者人不能有而已矣傳曰仁者夀則恆寒之地不仁者夭而死矣恆燠之地仁者夀而生矣苟恆寒之地夀其不仁者恆燠之地夭其仁者是寒燠為不祥之氣又何以佐天地生植乎哉如此則居寒而夀居燠而夭吾益不信也信乎存乎人者天不能奪而已哉或曰仁者夀不仁者亦夀不仁者夭仁者亦夭吾又不知命乎天存乎人果可信乎未也無乃自夀自夭自仁自不仁耶天不能與之又安能奪耶信矣子姑務乎仁無以山寒自欺吾亦信子之夀矣祀竈解竈之壞者請新之既成又請擇吉日以祀之曰竈在祀典聞之舊矣祭法曰王為羣姓立七祀其一曰竈達於庶人庶士立一祀或立户或立竈飲食之事先自火化以來生民賴之祀之可也說者曰其神居人間伺察小過詐譴告者又曰竈鬼以時録人功過上白於天當祀之以祈福祥此僅出漢武帝時方士之言耳行之惑也苟行君子之道養老而慈幼寒同而飽均喪有哀祭有敬不忘禮以約已不忘樂以和心室暗不欺屋漏不愧雖嵗不一祀竈其誣我乎苟為小人之道盡反君子之行父子兄弟夫婦人執一爨以自糊口専利以飾詐崇姦而樹非雖一嵗百祀竈其私我乎天至髙竈至下帝至尊嚴鬼至幽仄果能欺而告之是不忠也聽而受之是不明也下不忠上不明又果何以為天帝乎笠澤藂書卷四
