body:
  text: 笠澤藂書卷五唐陸龜䝉撰補遺詩築城詞二首城上一培土手中千萬杵築城畏不堅堅城在何處莫歎將軍逼將軍要郤敵城髙功亦髙爾命何勞惜古意君心莫淡薄妾意正棲託願得雙車輪一夜生四角美人美人抱瑤瑟哀怨彈别鶴雌雄南北飛一旦異棲託諒非金石性安得宛如昨生為並蒂花亦有先後落秋林對斜日光景自相薄猶欲悟君心朝朝佩蘭若感事將軍被鮫函秪畏金矢鏃豈知讒箭利一中成赤族古來信簧舌巧韻凄鏘曲君聞恱耳音盡日聽不足初因起毫髮漸可離骨肉所以賢達心求人須任目贈逺茱萸匣中鏡欲照心還懶本是細腰人别來羅帶緩從君出門後不奏雲和管妾思冷如簧時時望君暖心期夢中見路永魂夢短怨坐泣西風秋忩月華滿别離丈夫非無淚不灑離别間仗劍對樽酒恥為遊子顔蝮蛇一螫手壯士疾解腕所思在功名離别何足歎井上桐美人傷别離汲井常待曉愁因轆轤轉驚起雙栖鳥獨立傍銀床碧桐風嫋嫋門前路門前向城路一直復一曲曲去日中還直行日暮宿何必日中還曲途荆棘間引泉詩睦州龍興觀老君院作上嗣位六載吾宗㓨桐川余來拜旌㦸詔下之明年是時春三月繞郭花蟬聨嵐盤百萬髻上插黃金鈿授以道士館置榻於東偏滿院聲碧樹空堂形老仙本性樂凝淡及來更虛𤣥焚香禮真像盥手披靈編新定山角甬烏龍獨巉然除非净晴日不見蒼崖巔上有拏雲峯下有噴壑泉泉分數十汊落處皆峥潺寒聲入爛醉聒破西忩眠支笻起獨尋秪在牆東邊呼僮具畚鍤立鑿莓苔穿灇漴一𣲖墮練帶橫斜牽亂石拋落落寒流響濺濺狂奴七里瀨縮到疏楹前跳光潑半散涌沫飛㳬圓勢束三峽掛瀉危孤磴懸曽聞瑶池溜亦灌朱草田鳬伯㺯翠蕊鸞舞丹烟凌風捩桂柂隔霧馳􅙈船况當𤣥元家當著道德萹上善可比水斯文參五千精靈若在此肯惡微波傳不擬爭滴瀝還應㑹淪漣出門後飛箭合勢浮青天必有學真子鹿冠秋鶴顔如能輔余志日使疏其源素絲園客麗獨繭詩人吟五緵如何墨子淚反以悲途窮我意豈於是願參天地功為線補君衮為絃繫君桐左右修闕職宫商還古風端然潔白心可與神明通陸龜䝉傳陸龜䝉字魯望元方七世孫也父賔虞以文歷侍御史龜䝉少髙放通六經大義尤明春秋舉進士一不中往從湖州刺史張摶逰摶歷湖蘇二州辟以自佐嘗至饒州三日無所詣刺史蔡京率官屬就見之龜䝉不樂拂衣去居松江甫里多所論撰雖憂幽疾痛資無十日計不少輟也文成竄槀篋中或歷年不省為好事者盜去得書熟誦乃録讐比勤勤朱黃不去手所藏雖少其精皆可傳借人書萹秩壞舛必為輯褫刋正樂聞人學講論不倦有田數百畝屋三十楹田苦下雨潦則與江通故常苦饑身畚鍤茯刺無休時或譏其勞答曰堯舜黴瘠禹胼胝彼聖人也吾一褐衣敢不勤乎嗜茶置園顧渚山下嵗取租茶自判品苐張又新為水說七種其二慧山泉三虎丘井六松江人助其好者雖百里為致之初病酒再期乃已其後客至潔壺置杯不復飲不喜與流俗交雖造門不肯見不乘馬升舟設蓬席齎束書茶竈筆牀釣具往來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以髙士召不至李蔚盧擕素與善及當國召拜左拾遺詔方下龜䝉卒光化中韋莊表龜蒙及孟郊等十人皆贈右補闕陸氏在姑蘇其門有巨石逺祖績嘗事吳為鬱林太守罷歸無裝舟輕不可越海取石為重人稱其亷號鬱林石世保其居云後序進退取捨君子之大節惟循於道而不悖然後無愧於聖人之門非明輕重之理知好惡之正者未有不為物所勝也天隨子居衰亂之世仕不苟合家於松江躬勞苦甘淡薄而以讀書考古為事所養者厚故其為文氣完而志直言辨而意深一歸於尊君愛民崇善沮惡兹非所謂循於道而不悖者耶世所傳藂書多舛謬衮既至是邑想其遺風因求善本校證刋之於板俾覽者非獨玩其辭而已矣於其志節將有取焉政和改元季夏四日毗陵朱衮記續補遺此後四賦乃蜀本有之今添入微涼賦椒梧既謝越椒閩梧屈原增傷菱先雁敗柳徇蟬荒日落深宫十四等皆為麗絶雲愁大澤九百里盡欲飛揚暑退未退宵長未長傍寶階一作曲檻以尋冷當綺疏而薦香飄飄拂拂悄悄悵悵省團扇以搖清泥瑤琴而泛雅石穩將卧笻輕欲把沈尹見王筠佳詠不覺書之謝傳感桓伊哀筝無端涕下單棲悟早共賞情多應從逺壑定降明河病樹一枝度日空懷越奏輕帆十幅乘秋好唱湘歌殷浩休談楊𢎞自舞粉初漬而題媚塵適消而盡古正在安榴館裏寂寞饒潘暫登酸棗臺時凄涼付庾潛生翠被暗著金樓銖銖減癖斛斛量愁草𤣥者遂貧無暇梯附者結客而逰暮雨陵邊有魏主常聞之樂夕陽池上有蔡姬曽蕩之舟恨鎖疏烟襟披逺水霧桂方淡風篁或倚鄂侯之餘冷猶在江令之宿酲初起道氣全衰離情遍駛許玉斧神超碧落仰接應難成花君怨别青宫追傷未已秋蟲賦敗壁秋立昆蟲夜鳴蠆者角者旁行却行一不知其詭狀空太息於繁聲俱霑品彚共費生成穴隂階而負固抱枯蘚以圖榮退無力役進不爭名體肖翹而易動音嗚咽而難平深宫淚迸逆旅魂驚香殘漏永月昊樓明謝臨川行樂微吟應侵古調劉越石登陴坐嘯更裊餘清唧噴懷讒悽嘶往訴縷急如斷絃夭欲怒或自竒而不屈或相先而並妬亦有騷客裁録詞人暫賦已矜床下之光輝遽笑草間之霜露悲夫病枕潛移愁屏屢顧耿耿宵夢悠悠逺趣朱雲沒後方知直氣無前馮衍歸來始歎髙才不遇塵尾賦謝文靜桓宣武王東亭郤北府相與叩易論𤣥驅今駕古散入神明之頥中稽道德之祖理窟未窮詞源漸吐支上人者浮圖其形左擁竹杖右提山銘於焉就坐引若潛聽俄而齧缺風行逍遙義立不足稱異才能企及公等盡矚當仁咸云俯拾道材乃攝艾納而精爽捉􅙈柄以揮搰天機發而萬目張大壑流而百川入嗟乎世路﨑邪蕆訛掩瑕陽矜㽵而靜默暗奔競而喧譁貞襟柴棘奧㫖泥沙雖然絶代清談客置此那同王謝家幽居賦陸子居舍吳東距長洲故苑一里闔關不通人事且欲吟詠情性曰燕居則仲尼有之矣曰卜居則屈原有之矣曰間居則潘嶽有之矣曰郊居則沈約有之矣既抱幽憂之疾復為低下之居乃作幽居賦其序云余少學窮立早持堅白其生也懸贅附疣其材也戴癭銜瘤居無養拙之資出有倦遊之歎初張蓬矢嘗逞志於四方末佩桃符敢違仁於一日雖家風未泯而世德全衰門等韋平林兼魏邴激清芬而鎮俗追邪望於圖形荀勗乃天下表儀裴秀為朝端領袖朱輪十乘紫誥千萹炳若星辰煥乎竹帛俯觀圖牒謬辱孫謀五鼎蕭條賜書零落淶工酒保幾欲沈淪故栗空桑屢瞻摧折劉起劉毅俱無儋石之儲許邁許詢但有山林之志思鑿壞而遁聊倚樹而吟師道氣於龜腸扣兵鈐於魚腹窮年學劒不遇白猿隔日伏痁未逢黃鷁止則葭牆艾席行則葛屨柴車仲宣方玩於棋枰叔夜還眠於煆竈既知草知晦朔木讓榮枯因推墨别為三始悟儒分至八何晏之言道德不及王生鄭𤣥之注春秋才同伏氏初陳梗槩漸入精微探桓範之智囊掘張憑之理窟遺其耳目然復為之聰明差若毫釐焉足言乎大小加以病惟鬭蟻刀止戡蟬簾幃非翡翠之榮鐘鼓豈鶢鶋所樂遂非衡泌聊以棲遲建一畝之宫忝稱儒者置十金之産雅叶中人晏子以囂塵可容曹公以泥水自蔽羅含宋玉常居出於荆蠻蕭相武侯亦潛居於僻陋楊德祖家惟弱柳殷仲文庭只枯槐馮列薑辛繁欽蘭碧安有稻名半夏藥號恆春長榆亦降星精修竹乃生雲母潘嶽館裏嘗聞奈素瓜甘庾信園中亦話棗酸梨酢且故切切觀留詠惟尚清風今古攸同聖賢何逺武仲遊於沛澤伊尹耕於有莘子欲無言回不願仕神交六位方為賣卜之人歌動五噫始作賃舂之客况布縚綸帽尚足朝昏羽扇貂裘猶堪寒暑得以書袖虎僕射用牛螉自理茶租間披釣褐經稱小品還下二百籖賦謂名都略㸃八十處下問得犂塗之義涂聽聞訴怒之詩既已逢原遂成摛翰非因授簡初擬遺鞭不能粉飾大猷且用𤣥黃裨說貽於好事希從得意而傳責以壯夫甘受子雲之笑賦云泰伯勾吳通侯舊里地接虎丘門臨鶴市比顔巷兮非陋方賜牆兮猶峙樂令有名教之樂必以仁行莊生乃道家者流咸從達起彼既得矣余何謝焉欲神遊於浩氣法天隱於遺編魯仲孫衣止七升之布欒武子食無一卒之田賤不容憂貧惟可賀冥心而姑務藏疾卷舌而誰能擊墜爭先敢脫乎牛車自給方營於馬磨噫秦時亡命競作帝師吁漢末遺臣皆稱王佐吾焉用此僕病未能藝合歡求解表之力餌陟釐明攻冷之微悲少歌於趙一喜長嘯於孫登萬古騷人逺追乎橘浦百金􅀈事近出於松陵亦慕偷桃還憐嗜艾芰何悲尺蠖之屈未損丈夫之志投簪隱几聊思夷甫談𤣥搦札彈毫聊效文通奏記夫靜者􅏥之君名者實之賔進不參於多士退宜追乎逸人煩原土之五闕託髙風之四鄰才袪燥濕稍逺囂塵以日繫時且復窮於魯史穿池種樹正欲類於齊民室乏崇壇墉非縮板因坎宿以為洫謝䝉蘢而表限孟戒無是非之心阮通能青白之眼龜床鹿幘訝將隱兮何遲橡飯菁羮笑謀生之太簡是知名安可釣筆不堪耕有白鳳之才乃先為贅客有雕龍之辨然後為狂生雄自投而幾死襧流慟而將行外嬖方施孟子虛陳乎仁義中說既勝韓非徒恃其縱橫况復支離一鬱尫陋蹇吃才甚微而寡文體素羸而多疾隂鏗藥銚披曉幌以皆來徐邈酒鎗擁寒爐而必出自然忘物我混窮通將大宗師理叶與握真宰情同優遊塞馬脫落冥鴻竊慕王晞眷戀於芳辰美景深符謝眺留連於明月清風得不分崎岸而飾荒臺輟金錢而植佳樹蒪絲兮欲流千里草帶兮初圍十步頽垣抱碧無非海髮山衣暗座飄香盡是松肪桂蠧加以籬邊種菊後堂生萱覆林之新桐乍引臨忩之舊竹猶存花妨過帽柳礙移門夢去而雲遮絶洞樵歸而水繞孤村遇境逍遙就魚鳥之性樂開襟散誕見羲皇之道尊早濯𤣥泉屢遊庭菀憂度廢而將落懼無文而不逺豹管間窺羊岐忘返搜束晰之亡缺補陳農之遺遁梁世祖府充名畫或得竒蹤任敬子家聚羣書率多異本何嘗髣佛莫究分毫徒羡玉杯珠柱上書名下琴名之號美象格犀簮之態髙寧容朴野不稱蓬蒿悵殘編之未構奚雅具之為勞况乎棲平蕪古木之地壯披褐擁萹之事宜其梓合巾葙藤交餅笥炊粃稗以為食割瓠􅕕而作器荷條而行據梧而睡妖寧勝德休占賈誼乘塵醉可全真但舞王戎如意其間豁爾此外蕭然姜肱則惟眠一被江革則還留夾氈望夫子之門牆仍過數仞顧先生之履襪不啻雙穿敢驚時而獨行聊收視而返聽豈可浪發志關虛搖談柄夜將半而誰客月每旦而誰評去聲清言不屈孫劉詎減於中軍善講無窮支許那輕於小令或抽易軸叩𤣥端演精微於簡易消淡泊於圖難澄如止水􅀢則音若長竿與去音牛心者赴敵持麈尾者登壇交衡而矛㦸初利頓挫而風霜正寒興公雅韻仲祖旁觀始信何才當指地於丞相方知習健抗彌天之道安彼濩落而無容且蕭條而髙寄兼耳目以咸外曷丘園之足賁幸春物之內榮列天姿而見遺隂者負而陽者勝孰謂兩儀瘠者緩而腴者先奚云一氣真宰難問洪鈞肯留人間未適象表何求縱使陶烟霞而傲睨騎日月以嬉逰乘剛直上躡景𡨕搜縱橫兮四海飛揚十洲閲仙苑之琅書安能解愠傾落公之金醴幾得銷憂不假大招寧馳别國悲故鄉之何在望平原之無極陸鄉在平原乃逺祖所封之地歎鍾鼎之沈光向漁樵而騁力庚桑有道猶居㟪㠥之顔接輿佯狂亦取杶音椿櫨之食徐誇下舍陶愛吾廬上法於陵之畦圃旁分建業之村墟時牽殗自把渠疏友乏惠施莫解連環之義醫無文摰誰知方寸之虛存其道而或通失其居而闕旅才將命兮分坎坎性與時兮甘齟齬間遊廣澤願學弋於蒲且弋或作戈終蹈滄溟更移家於苧嶼夫動以勞吾身靜以沐吾神苟能推於用捨自足究乎天人思任誕於窮檐何辭井臼不求容於側徑何患荆榛湛音沈冥者朴素之源毁譽者浮華之撒蓍名聚雪仍招死草之譏琴號落霞亦被枯桐之誚一作說值聖則幽贊成功逢賢則雅音攸發同於德者大亦宜然殷宗命相於巖下周武迎師於渭邊有山東北郭之風才能養素有左車右侯之計未足圗王嗟浩歎而哀吟畏蘭雕而蕙歇清樽方艷於瑤水寶瑟坐凝於華月歸田少接猶疑斥鷃追飛夜獵相逢可謂蕪菁搪突笠澤藂書卷五
