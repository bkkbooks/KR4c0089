body:
  text: 笠澤叢書别集類一唐提要臣等謹案笠澤叢書四卷補遺一卷唐陸龜蒙撰龜䝉有耒耜經已著録此集為龜䝉自編以其叢脞細碎故名叢書以甲乙丙丁為次後又有補遺一卷宋元符間蜀人樊開始序而梓之政和初毗陵朱衮復行校刋止分上下二卷及補遺為三此本為元季龜䝉裔孫德原重鐫既依蜀本釐為四卷而序仍毗陵本作三卷者字偶誤也王士禎漁洋文略有此書跋謂得都穆重刋蜀本內紀錦裙在丙集迎潮詞在丁集而此本錦裙乙集迎潮詞在丙集叙次又不盡依蜀本之舊疑德原又有所竄亂矣龜䝉與皮日休相倡和見于松陵集者工力悉敵未易定其甲乙惟雜文則龜䝉小品為多不及日休文藪時標偉論然閒情別致亦復自成一家固不妨各擅所長也乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀陸魯望文集序唐賢陸龜䝉字魯望三吳人也幼而聰悟通六藉尤長於春秋常體江謝賦事名振江右與顔蕘皮日休羅隱吳融為友性髙潔家貧親老屈與張搏為湖蘇二郡佐嘗至饒州三月無所詣刺史率官屬就見之龜䝉不樂拂衣去居松江甫里多所論撰著吳興實録四十卷松陵集十卷笠澤藂書八十餘篇自謂江湖散人或號天隨子甫里先生唐末以左拾遺授之詔下日疾終贈左補闕本朝宋景文公重修唐書仍列於隱逸傳今蜀中惟松陵集盛行笠澤藂書未有是書家藏久矣愚謂貯之篋笥以私一人之觀覽不若鏤板而傳諸好事庶斯文之不墜而魯望之名復振亦儒者之用心也時聖宋元符庚辰嵗仲秋月郫人樊開題
