body:
  text: 笠澤藂書跋右笠澤藂書三巻唐甫里先生之所論著也先生既自號天隨子又自謂江湖散人其所著書有松陵集有吳興實録而此編又謂之笠澤藂書者蓋以其藂脞細碎多補遺殘編然起甲迄丁篇什不滿百豈猶有待於後歟先生出處大致已見唐書隠逸傳至於樊開則為文集序朱衮則又為文集後序然皆不出于唐書列傳也嗚呼唐自懿僖以後不惟士氣萎薾文章亦與時髙下先生當此時憤鬰窮愁非悼已也忼慷論列非求知也特以積之厚則發之宏身之窮則言之暢也顧其志既不能自達於廟朝之崇深又不能自暴著於天下四海隠約在下而山林江海蛟鯨蛇虎吞噬肆毒士幾無所容其身而先生牛衣之所呻吟鸛垤之所嘆恨者豈為流連光景陶寫性情之具哉特以先生之澤更大亂而猶存故雖一嚬一蹙不忘愛君憂國之誠傷今思古而作也自非其所造詣卓然有見於六籍之醇全則亦何以臻此也德原距先生歿幾五百年門緒衰落既同編甿然猶以世澤之所沾濡聞見之所開沃粗能自立於士君子之林私自惟念先生既深明春秋宜有論説然當亂世學校廢經術熄故其書不傳今清朝右文既以書院祀先生於呉下而其遺書若松陵集皮陸倡和皆已行於世而藂書雖板刻於宋元符間然而蕪沒乆矣今而刻之書院者将與好事者共之也夫先生之於經術學者既不見夫春秋之所討索者矣然因藂書以推見先生之所學則其卓然有見於道而可以刻之學校者夫豈區區一隠淪之士而已哉至元仍紀元之五年嵗在庚辰七月一日十一世孫德厚百拜謹題
