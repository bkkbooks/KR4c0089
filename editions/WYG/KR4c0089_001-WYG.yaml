body:
  text: 笠澤藂書巻一唐陸龜䝉撰藂書者藂脞之書也藂脞猶細碎也細而不遺大可知其所容矣自乾符六年春卧病于笠澤之濵敗屋數間蓋蠧書十餘篋伯男兒纔三尺許長䃣音毁齒猶未徧教以藥劑象梧子大小外研墨沌筆供紙札而已體中不堪羸耗時亦隠几強坐内壹鬱則外揚為聲音歌詩賦頌銘記傳序往往雜發不類不次混而載之得稱為藂書自當去諼許園切憂之一物非敢露世家耳目故凡所諱中略無避焉笠澤松江之名江湖散人傳散人者散誕之人也心散意散形散神散既無羈限為時之恠民束於禮樂者外之曰此散人也散人不知耻乃從而稱之人或笑曰彼病子之散而目之子反以為其號何也散人曰天地大者也在太虚中一物耳勞乎覆載勞乎運行差之晷度寒暑錯亂望斯須之散其可得耶水土之散稽有用乎水之散為雨為露為霜雪水之局為瀦為洳為潢汙土之散封之可崇穴之可深生可以藝死可以入土之局塤不可以為埏甓不可以為盂得非散能通於變化局不能耶退若不散守名之筌進若不散執時之權筌可守耶權可執耶遂為散歌散傳以志其散散人歌江湖散人天骨竒短髮搔來蓬半垂手捉孤篁曵寒繭口誦太古滄浪詞詞云太古萬萬古民性甚野無風期夜棲正與禽獸雜獨自構架縱横枝因而稱曰有巢氏民共敬貴如君師當時只效烏鵲輩豈是有意陳尊卑無端後聖穿鑿破一派前導千流隨多方惱亂元氣死日使文字生姦欺聖人事業轉消耗尚有漁者存熙熙風波不獨困一士凡百器具皆能施罛疎扈腐鱸鱖脱正失檢馭非讒疵人間所謂好男子我見婦女留鬚眉奴顔婢脨真乞丐反以正直為狂癡所以頭欲散不散弁峩巍所以腰欲散不散珮陸離行散任之適坐散從傾欹語散空谷應笑散春容披衣散單複便食散酸醎宜書散渾真草酒散甘醇醨屋散勢斜直樹散行叅差客散忘簪屨禽散虛籠池外物一以散中心散何疑不共諸侯分邑里不與天子専隍陴静則守桑柘亂則逃妻兒金鑣貝帶未嘗識白刃煞我窮生為或聞蕃将負恩澤號令䥫馬如風馳大君年小丞相少當軸自請都旌旗神鋒悉出羽林仗繢畫日月蟠龍螭太宗基業甚牢固小醜背叛當殱夷禁軍近自肅宗置抑遏輔國争雄雌必然大段剪兇逆須召勁勇扶君麾四方賊壘猶占地死者暴骨生寒饑歸來輒擬荷鋤笠詬吏已貴租錢遲興師十萬一日費不啻千金何以支秖今利口且箕斂何暇俛首哀惸􅄔均荒補敗豈無術布在方冊撑頽隵冰霜襦袴易反掌白面諸郎殊不知江湖散人悲古道悠悠幸寄羲皇慠官家未議活蒼生拜賜江湖散人號後虱賦并序余讀玉溪生虱賦有就顔避跖之歎似未知虱作後虱賦以矯之衣緇守白髮華守黑不為物遷是有常德小人趨時必變顔色棄瘠涵腴乃虱之賊移石盆絶句移得龍泓瀲灧寒月輪初下白雲端無人盡日澄心坐倒影新篁一兩竿杞菊賦并序天隨子宅荒少牆屋多隙地著圖書所前後皆樹以杞菊春苗恣肥日得以採擷之以供左右杯案及夏五月枝葉老硬氣味苦澀旦暮猶責兒童拾掇不已人或歎曰千乗之邑非無好事者家日欲擊鮮為具以飽君者多矣君獨閉關不出率空腸貯古聖賢道德言語何自苦如此生笑曰我幾年來忍飢誦經豈不知屠沽兒有酒食耶退而作杞菊賦以自廣云惟杞惟菊偕寒互緑或穎或苕煙披雨沐我衣敗綈我飯脱粟羞慚齒牙苟且􅆝肉蔓延駢羅其生實多爾杞未棘爾菊未莎其如予何其如予何甫里先生傳甫里先生者不知何許人也人見其耕於甫里故云甫里松江上村墟名先生性野逸無羈檢好讀古聖人書探六籍識大義就中樂春秋抉摘微㫖見文中子王仲淹所為書云三傳作而春秋散深以為然貞元中韓晉公嘗著春秋通例刻之于石今在潤州文宣王廟意以是學為己任而顛倒漫漶胡館切翳塞無一通者殆将百年人不敢指斥疵纇先生恐疑誤後學乃書摭而辨之先生平居以文章自怡雖幽憂疾病中落然無旬日生計未嘗暫輟㸃竄塗抺者紙札相壓投于筐箱中厯年不能浄冩一本或好事者取去後於他人家見亦不復謂已作矣少攻歌詩欲與造物者争柄遇事輒變化不一其體裁始則淩轢波濤穿穴險固囚鎖恠異破碎陣敵卒造平澹而後已好潔凡格音各忩户硯席剪然無塵埃得一書詳熟然後寘于方冊值本即校不以再三為限朱黄二毫未嘗一日去于手所藏雖少咸精實正定可傳借人書有編簡斷壊者緝之文字謬誤者刋之樂聞人為學講評通論不倦有無賴者毁坼揉汙或藏去不返先生戚然自咎先生貧而不言利問之對曰利者商也今既士矣奈何亂四人之業乎且仲尼孟軻氏所不許先生之居有地數畝有屋三十楹有田竒十萬步吳田一畝當二百五十步有牛不減四十蹄有耕夫百餘指而田汙下暑雨一晝夜則與江通色無别已田他田也先生由是苦飢囷倉無斗升蓄積乃躬負畚鍤率畊夫以為具且每嵗波雖狂不能跳吾防溺吾稼也或譏刺之先生曰舜黴瘠大禹胼胝彼非聖人耶吾一布衣耳不勤劬何以為妻子之天乎且與蚤虱名器雀鼠倉庾者何如哉先生嗜茶荈置園於顧渚山下山在吳興郡嵗貢茶之所嵗入茶租十許簿為甌㰕之實自為品第書一篇繼茶經茶訣之後茶經陸羽撰茶訣皎然撰南陽張又新嘗為水説凡七等其二曰恵山寺石泉無錫縣華山其三曰虎丘寺石井其六曰吳松是三水距先生逺不百里髙僧逸人時致之助其好先生始以喜酒得疾血敗氣索者二年而後能起有客至亦潔罇置觶但不復引滿向口爾性不喜與俗人交雖詣門不得見也不置車馬不務慶弔内外姻黨伏臘喪祭未嘗及時往或寒暑得中體無事時乘小舟設蓬席賫一束書茶爐筆床釣具櫂船郎而已所詣小不㑹意徑還不留雖水禽決起山鹿駭走之不若也人謂之江湖散人先生乃著江湖散人傳而歌詠之由是混毁譽不能入利口者亦不復致意先生性悁急遇事發作輒不含忍尋復悔之屢改不能久先生無大過亦無出入人事不傳姓名無有得之者豈涪翁漁父江上丈人之流者乎自遣詩并序自遣詩者震澤别業之所作也故疾未平厭厭卧田舍中農夫日以耒耜事相聒每至夜分不睡則百端興懐攪人思益紛亂無緒且詩者持也謂持其情性使不暴去因作四句詩累至三十絶絶各有意既曰自遣亦何必題為五年重别舊山村樹有交柯犢有孫更感卞峰顔色好曉雲纔散便當門雪下孤村淅淅鳴病魂無睡洒來清心揺秖待東忩曉長媿寒雞第一聲多情多感事難忘秖有風流共古長座上不遺金帶枕陳王詞賦為誰傷甫里先生未白頭酒旗猶可戰髙樓長鯨好鱠無因得乞取艅艎作釣舟花瀨濛濛紫氣昏紫花瀨在顧渚步水邉山曲更深村終須揀取幽栖處老檜成雙便作門隂洞曾為採藥行冷雲凝絶燭微明玉芝敲折琤然墮合有真人上姓名長歎人間髮易華暗将心事許烟霞病來前約分明在藥鼎書囊便是家醖得秋泉似玉容比於雲液更應濃思量北海徐劉輩枉向人間號酒龍羊偘口旱口汗二切多應自古豪解盤金稍置纎腰縱然此事教雙得不博溪田二頃苗偶然攜稚看微波臨水春寒一倍多便使筆精如逸少懶能書字換羣鵞昔聞莊叟迢迢夢又道韓生苒苒飛知有姓名聊寄問更無言語抱斜暉雪侵春事大無端舞急微還近臘寒應是也疑真宰怪休時猶未徧林巒數尺逰絲墮碧空年年長是惹春風争知天上無人住亦有春愁鶴髮翁誰使寒鴉意緒嬌雲晴山晚動情憀亂和殘照紛紛舞應索陽烏次第饒古往天髙事渺茫争知靈媛不凄涼月娥如有相思淚秖待方諸寄兩行本來雲外寄閑身遂與溪雲作主人一夜遡風愁四散曉來零落傍衣巾淵明不待公田熟乗興先秋解印歸我為餘糧春未去到頭誰是復誰非雲擁根株抱石危斵來文似瘦蛟螭幽人帶病慵朝起祇向春山盡日欹月澹花閑夜已深宋家微詠若遺音重思萬古無人賞露濕清香獨滿襟宋玉有微詠賦南岸春田手自農往來横絶半江風有時不耐輕橈興暫欲蓬山訪洛公賢達垂竿小隠中我來真作捕魚翁前溪一夜春流急已學嚴灘下釣筒水國君王又姓蕭風情由是冠南或作前朝靈和殿下巴江栁十二樓前等翠條强梳蓬鬢整斜冠片燭光微夜思闌天意最饒惆悵事單栖分付與春寒無多藥圃近南榮合有新一作春苗次第生稚子不知名品上恐隨春草鬭輸贏一派溪隨若下流春來無處不汀洲漪瀾未碧蒲猶短不見鴛鴦正自由山下花明水上曛一橈青翰破霞文越人但愛風流客繡被何須屬鄂君妍華須是占時生准擬差肩不近情佳麗幾時腰不細荆王辛苦致宫名奼女精神似月孤敢将容易入洪爐人間縱道鈆華少蝶翅新篁未肯無貞白求丹變姓名主恩潛助亦無成侯家竟換梁天子王整徒勞作外兵春雨能膏草木肥就中林野碧含滋唯餘病客相逢背一夜寒聲減四肢二遺詩并序二遺者何石枕材琴薦也石者何松之所化也化於何越之東陽也東陽多名山就中金華為最枝峰蔓壑秀氣磅礴數百里不啻而神仙登臨草木芬怪永康之地亦蟬聯其間中饒古松往往化而為石磐根大柯文理曲折盡在好事者得而致於人間以為耳目之異太山羊振文得枕材趙郡李中秀得琴薦皆兹石也咸以遺予予以二遺之竒聊賦詩以謝誰從毫末見叅天又到蒼蒼化石年萬古清風吹作籟一條寒溜滴成穿閑追金帶徒勞恨静格音各朱絲更可憐幸與野人俱散誕不煩良匠更雕鐫人日代客子是年人日立春人日兼春日長懐復短懐遥知雙綵勝併在一金釵閑書病學髙僧置一牀披衣纔暇即焚香閑堦雨過苔花潤小簟風來薤葉涼南國羽書催部曲時黄巢圍廣州告急東山毛褐慠羲皇升平聞道無時節試問中林亦不妨鵁鶄詩并序客有過震澤得水鳥所謂鵁鶄者貺余黑襟青脛碧爪丹噣張救反鳥嘴也色幾及項質甚髙而意萆一本作草戚畏人余極哀其野逸性又非以能招累者而囚録籠檻逼迫忩户俛啄仰飲為活大不快真天地之窮鳥也為之賦詩擬好事者和詞賦曾誇鸀徒角切鳿牛欲切流果為名悞别滄洲雖䝉静置疎籠晚不似閒栖折葦秋自昔稻粱髙鳥畏至今珪組野人讎防微避繳無窮事好與裁書謝白鷗苔賦江文通嘗著青苔賦置苔之狀則有懲勸之道雅未聞也如此則化下風上之㫖廢因復為之以嗣其聲云天地閉風雨積門逕秋莓苔植離方抱圓累紫疊碧始分封於危亭之下終絡地於荒畦之側侵竹塢而縱步佔蘭疇而盈尺麗色何似嘉名孰為髙有瓦松卑有澤葵散巖竇者石髪補空田者垣衣在屋曰昔邪在藥曰陟釐質被緑錢之美香聞艾納之竒或藫音徒含反或􅀈或蘚或菭丈笞反諒含􅐾而是類斯感物以隨時則有衛霍天姻金張世族侯以恩澤拜館以形勝築壁僭塗椒階縁墄玉牀丹儌之象盡帳蒼梧之翠秃謂爵禄不必仁守英髦可以力服行叶四凶身圖五福一日盈滿中年顛覆斯苔也染婕妤之篲殆晚偏青封廷尉之門經秋更緑彼失寵以亡家者鮮不動哭則有林塘倚薄衡泌蕭條茅茨上古機格音各南朝晝偃則書淫畫聖晡歸則婦餉兒樵溝通壊壍路隔危橋雨霽而魚驚沬聚霜乾則鶴刷翎飄浪求名而蠖屈虚卜命而龜焦忩欹癭枕樹挂風飄山無價買隠有詞招斯苔也周内史宿酒壺邊烟翍思起屈大夫𢷬衣砧上黛㸃情饒彼遺形而放志者能無獨謡謡曰苔之生兮自若人有哀兮有樂哀者貴兮樂者賤貴者危兮賤者宴噫哀樂兮何時止貴賤循環兮而後已書李賀小傳後玉溪生傳李賀字長吉常時旦日出遊從小奚奴騎駏驢背一古破錦囊遇有所得即書投囊中暮歸足成其文予為兒時在溧陽聞白頭書佐言孟東野貞元中以前秀才家貧受溧陽尉溧陽昔為平陵句縣南五里有投金瀨瀨南八里許道東有故平陵城周千餘步基址坡陁裁髙三四尺而草木勢甚盛率多大櫟合數夫抱藂蓧䝉翳如塢如洞地窪下積水沮洳深處可活魚鼈輩大抵幽邃岑寂氣候古澹可嘉除里民樵罩外無入者東野得之忘歸或比日或間日乗驢領小吏經驀投金渚一往至則䕃大櫟隠巖蓧坐于積水之旁苦吟到日西而還爾後衮衮去曹務多弛廢令季操卞急不佳東野之為立白上府請以假尉代東野分其俸以給之東野竟以窮去吾聞淫畋漁者謂之暴天物天物不可暴又可抉摘刻削露其情狀乎使自萌卵至于槁死不能隠天能不致罰耶長吉夭東野窮玉溪生官不挂朝籍而死正坐是哉正坐是哉蚕賦并序荀卿子有蚕賦楊泉亦為之皆言蚕有功於世不斥其禍於民也余激而賦之極言其不可能無意乎詩人碩鼠之刺於是乎在古民之衣或羽或皮無得無喪其游熙熙藝麻緝纑官初喜窺十奪四五民心乃離逮蚕之生繭厚絲美機杼經緯龍鸞葩卉官誕益嚵盡取後已嗚呼既豢而烹蚕實病此伐桑滅蚕民不凍死雜説先儒曰瞽瞍憎舜使塗廩浚井酖于觴酒欲從而殺之舜謀於二女二女教之以鳥工龍工藥浴注豕而后免矣夫勢之重壯夫不能不畏位之尊聖人不得不敬況舜攝于天子頑嚚嫚傲者獨不畏之又從而殺之耶且堯之妻二女帥九子觀舜之德舜反受教於女子其術恠且如是是不教人以孝道教人以術免也故堯使勗之非觀德也何足以天下付邰侯姜女之生子也始棄之命之曰棄宋芮司徒之生女也始棄之亦命之曰棄邰棄為稷官蒸民賴之宋棄美而生佐幾移於宋國名之同也奚傷舜重瞳子項羽亦重瞳子形之類也奚病擇其道如何耳季札以樂卜趙孟以詩卜襄仲歸父以言卜子游子夏以威儀卜沈尹戌以政卜孔成子以禮卜其應也如響無他圖在精誠而已不精誠者不能自卜況吉凶他人乎傳曰武王罷朝而襪繫絶顧左右無可結者衛禇師呼聲子結襪而登席漢廷尉為王生結襪襪之有帶其來尚矣今獨亡之嗚呼古之制亡者十九奚襪帶之足云栁下恵之妻誄其夫門人不能竄一字吕不韋作春秋秦人不敢損一字德與刑如何哉大儒評世以孟軻荀卿子為大儒觀其書不悖孔子之道非儒而何然李斯嘗學於荀卿入秦干始皇帝并天下用為左丞相一旦誘諸生聚而坑之復下禁曰天下敢有藏百家語詣守尉燒之偶語詩書者棄市昔孔子之於弟子也自仲由冉求已下皆言其可使之才及其仁則曰不知也斯聞孔子之道於荀卿位至丞相是行其道得其志者也反焚滅詩書坑殺儒士為不仁也甚矣不知不仁孰謂況賢知而傳之以道是昧觀聽也雖斯具五刑而況矧得稱大儒乎吾以為不如孟軻自憐賦并序余抱病三年於衡泌之下毉甚庸而氣益盛藥非良而價倍髙每一把臂一下杵未嘗不解衣撤食而後致也為窮且否一作病亦已至矣聖人云五福六極之數曰夀曰富曰康寧曰貧曰疾曰憂既貧且疾能無憂乎憂既盈矣能無傷乎人既傷矣能無奪夀乎是不䝉五福偏被六極者也誰其憐之作自憐賦噫天地兮何德以生予付遂古之道兮恵或作専而行諸聖人耕吾亦耕聖人漁吾亦漁聖人窮或過于是聖人達曾不依於既不獲築説莘尹委身而理天下又不及箕巢穎許散髪而類鶉居率幽憂之情抱将退伏於林廬謂之積兮繁其疏捜羅以虛謂之枵兮輔其儲涵潢乃瀦旁無垠兮上無初退不足兮進有餘光寒束縮後燠敷舒首蓬隆以半散肢棘瘠而枯疎中躁兮熸炮之蟹外撓兮冠帶之狙淩兢兮上坂之馬帖捻兮横沙之魚行則左人而右杖卧則夕擁而晨袪冒忌者即席奮擊責功者越月紆徐痿寧忘起憤亦懐攄天難致問道竟何如孟子之言得矣盡信不如無書雖武城取其二三䇿而已又焉如是歟非歟皋陶瘖師曠瞽予則視瞻而言語郄克跛行父秃予則趨蹡而􅌨沐幸固陋而或令豈乖離乎素躅敢諫鼓不陳進善旌不理布衣之説無由自通乎天子丞相府不開平津閣不立布衣之説無由自通乎宰執苟吾君吾相不聞天下之名言則蒼生何由弛械而去縶傳云垂之空言不若存之於事業易曰未繘井羸其缾凶歎水德之莫及哀吾材之不試徒抱影以中泣一蝎在木兮柯瘍葉痿寒暑三病兮吾寧禦衰服猛鷙兮捕龍螭吾無力支大舜禹兮張孔姬吾其庶幾託斯文之赴愬冀君子之攸宜苟家聾户塞之弗寤老死空山兮已而新秋月夕客有自逺相尋者作吳體二首以贈風初寥寥月乍滿杉篁左右供餘清因君一話故山事憶鶴互應深溪聲雲門老僧定未起白閣道士遥相迎日聞羽檄日夜急掉臂欲歸巖下行又驚聞逺客訪良夜扶病起坐綸巾欹清談白苧思悄悄玉繩銀漢光離離三吳烟霧且如此百越琛賮來何時林端片月落未落强慰别情言後期獨夜新秋霽夜有清境窮檐病客無佳期生公把經向石説而我對月須人為獨行獨坐亦獨酌獨翫獨吟還獨悲古稱獨立與獨步若比羣居終校竒石竹花詠曾看南朝畫國娃古羅衣上碎明霞而今莫共金錢鬭買却春風是此花寄吳融字子華一夜秋聲入井桐數枝危緑怕西風霏霏晚砌烟華上淅淅疎簾雨氣通君整輪蹄名未了我依琴鶴病相攻到頭江畔從漁事織作中流萬尺篊春寒賦宋玉雲夢侍從賦成酒闌君王慘憺顧曰春寒玉少進曰大王之國三分水居其一大王之宫後庭女充溢波浮其空幽怨積其中不得不雨不得不風風横雨斜天地溟濛寒之中人有異於嚴冬其來也低迷其狀也惆悵理難辨而詞作色雖莊而意蕩朋比薰鑪留連輔帳相逢置酒則少避􅋳顔獨自登樓則偏淩逺望臨忩户遶池塘絲輕畏逼花怯愁當掩抑兮幽襟更逺連牽兮别緒彌長齊紈失色越絮騰光芳神失職隂御争强朝畊犢戰暮箔蚕僵民病如此君何弗傷襄王於是下席稱謝徹燕少省嬪嬙以黄金為玉夀然後返駕於髙唐此賦湖州教授關注子東得之江南徐鍇文集注中今附於此㑹稽石公轍識笠澤藂書巻一
