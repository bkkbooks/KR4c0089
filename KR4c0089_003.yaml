body:
  text: 笠澤藂書巻三唐陸龜䝉撰田舍賦江上有田田中有廬屋以菰蔣扉以籧篨笆籬楗微方竇櫺疎檐卑欹而立傴僂户偪側而行趑趄蝸旋頂隆龜拆旁塗夕吹人靣朝陽曝膚左有牛棲右有雞居將行膯遮未起啼驅宜從野逸反若囚居天隨子愀然而吁復自諫曰禄以代耕如無禄歟無禄無畊為工商歟有沮溺之賢以仕易農乎有輪扁之道以仕易工乎有弦髙之義以仕易商乎今則不然能無說焉蓋仕不愧禄而揣政咸率人以奉已使農工之洎民弃其守而趨仕農之仕墮於力而希嵗工之仕巧於文而幸貴商之仕射其肥而啗利所以國靡凶荒之儲家乏完堅之器人闕有無之備莫不由是加以上多而下寡不勝利喪之苦轉從盜聚而充熾嗚呼吾丁此時何以逭之將提新書抱野史上干天子之有司如怒鼃之跳梁於風雨自謂登乎龍籍不其逺而逺而有牛角角有田棊棊不值嵗惡未嘗孔飢今則陽亢而驕苗渴而萎十穂百粒穫夫涕洟饘於是粥於是信夫鼎銘之我欺彼為聖人儉者茅茨勞者胼胝顧予懦夫勤陋何疑有鰥在下者舉舜之德毋惟汝諧者授禹之辭不舉不授雖聖胡為乃繼而為詩道不可不若天不可不樂謹爾溝塍利我錢鏄聊以卒嵗更俟東作五歌并序古者謌詠言詩云我歌且謡傳曰勞者願謌其事吾言之拙艱不足稱詠且謡而歌其事者非吾而誰作五歌以自釋意放牛歌江草秋窮似秋半十角呉牛放江岸隣肩抵尾乍依隈橫去斜奔忽分散荒陂斷壍無端入背上時時孤鳥立日暮相將帶雨歸田家烟火微茫濕水鳥歌水鳥山禽雖異名天工各與雙翅翎巢吞啄即一例㳺處髙卑殊不停則有􅀢鈹普皮切爪㦸勁立直眎者擊摶挽裂圖膻腥如此等色恣豪橫聳身往往凌青冥為人羅絆取材力韋韝綵綬懸金鈴三驅不以鳥捕鳥矢下先得聞諸經超然可繼義勇後恰似有知行天刑鷗閑鶴散兩自遂意思不受人丁寧今朝櫂倚寒江汀舂鉏翡翠參鵁鶄孤翹側睨瞥滅沒未是即肎馴簷楹婦女衣襟便佞舌始得金籠日提挈精神卓犖背人飛冷抱蒹葭宿烟月我與時情大乖刾祗是江禽有眉髮慇懃謝汝莫相猜歸來長短同羣活刈穫謌自春徂秋天弗雨廉廉早稻纔遮畆芒粒稀疎熟更輕地與禾頭不相拄我來愁築心如堵更聽農夫夜深語凶年是物即為灾百陣野鳬千穴䑕平明抱杖入田中十穂蕭然九穂空敢言一嵗囷倉實不了如今朝暮舂天職誰司下民食苟有區分宜扸扸本作耕耘意若何䖝豸兼敎食人食古者為邦須蓄積魯飢尚貴如齊糴今之為政異當時一任流離但徵索平生早遇華陽客向日飡霞轉肥白欲賣耕牛弃水田移家直傍三茅宅雨夜歌屋小茅乾雨聲大自疑身著蓑衣卧兼似孤舟小泊時風吹折葦來相佐我有愁襟無可那纔成好夣剛驚破背壁殘燈不及螢重挑却向燈前坐食魚歌江南春旱魚無擇嵗晏未曽腥鼎鬲今朝有客賣鱸魴手提見呼見反我長於尺呼兒徑取紅蓮米輕重相當加十倍且作呉羹助早飡飽卧晴簷曝寒背橫戈負羽正紛紛祗用驍雄不用文争如曉夕嘔吟様好伴滄洲白鳥羣象耕鳥耘辯世謂舜之在下也田於歴山象為之耕鳥為之耘聖德感召也如是余曰斯異術也何聖德歟孔子叙書於舜曰濬哲文眀聖德止於是而足矣何感召之云云乎然象耕鳥耘之說吾得於農家請試辯之吾觀耕者行端而徐起墢欲深獸之形魁者無出於象行必端履必深法其端深故曰象耕耘者去莠舉手務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘試禹之績大成而後薦之於天其為端且深非得於象耕乎去四㓙恐害於政其為疾且畏非得於鳥耘乎不然則雷澤之漁河濵之陶一無感召何也豈聖德有時而不德耶孟子曰堯舜與人同耳而好事者張以就其恠恠非聖人之意也吾病其書之異端毆之使合於道人其從我乎雖不從吾亦不能變其說禽暴冬十月予視穫于甫里旱苗離離年無以搘憂傷盈懐夜不能寐往往聲類暴雨而疾至者一夕凡𢾗四明日訊其甿曰鳬鷖也其曹蔽天而下蓋田所當之禾必竭穂而後去曰得無弋羅者捕而耗之耶對曰江之南不能弋羅常藥而得之􅽽􅶡上箆下西塗杖藂植于陂一中千萬膠而不飛是藥也出於長沙豫章之涯行賣貨錯嵗售於射鳥兒盜興已來䝉衝塞江其誰敢商是藥旣絶羣鳬恣翔幸不充乎口腹反侵人之稻糧予曰嘻失馭之民化為盜闗梁急征商不得行使江湖小禽亦肆其暴以害民食古聖人毆害物之民出乎四裔矧害民之物乎俾生靈死乎盜死乎飢吾不知安用馭者為告白蛇文田廬西北偏有古丘焉髙可四望予將昇之以眺逺舒鬱農民遮言曰不可是丘有蛇巨如井缶而白忤之能為祟不利人多矣宜無往予取酒沃其丘告之曰生而白者犬雞馬牛而已其餘則老而後白狼狐兎鹿烏雀燕雉龜蛇之類是也人老而毛髮皓白耗眊昏倒不能記子孫名字形朽神潰以至于死物老而鱗毫羽甲盡白白而後有靈非一聖賢存乎上德被光于下則不為之出出必人奉之以獻不敢隱匿唯蛇不在瑞典雖然神而且靈尚矣故漢之興神姥謂之白帝子得非天命志恠者必曰自然多穴老墳􅑆大木要野甿盤肩􅀈酒之享作小兒女子寒暑瞢眩淫巫倚之彈絲瞋目歌舞其妭怛駭其惑考皷用幣僭冒其上嵗時奔走畏在人後疾病不治飢寒不辭悉爾輩之為也古者鑄鼎象物也使民知神姦若之姧吾知之矣况㭚吾之地由我進退蟄以時出無越昆䖝之職無雜鬼神之事吾宫居若野處各有分齊不相害然斬翳通巔為暇日憑藉之所則不當與人争也如不用吾言吾當籲天霆斷裂首尾然吾誠不移無易爾為祝牛宫辭并序冬十月耕牛為寒築宫納而皁之建之前日老農請乞靈於土官以從鄉教予勉之而為辭四牸三牯中一去乳天霜降寒納此室處老農拘拘度地不畝東西幾何七舉其武南北幾何丈二加五偶楹當間載尺入土太嵗在亥餘不足數上締蓬茅下逺官府耕耨何時飲食得所或寢或卧免風免雨宜爾子孫實我倉庾招野龍對昔豢龍氏求龍之嗜欲幸而中焉得二龍而飲食之龍之於人固類異以其若已之性也席其宫沼百川四溟之不足㳺甘其飲食洪流大鯨之不足味㢮㢮然擾擾然其愛弗去一旦值野龍奮然而招之曰爾奚為者茫洋乎天地之間寒而蟄陽而昇能無勞乎誠從吾居而宴安乎野龍矯首而笑之曰若何齪齪乎如是耶賦吾之形冠角而被鱗賦吾之德泉潛而天飛賦吾之靈嘘雲而乘風賦吾之職抑驕而澤枯觀乎無極之外息乎大荒之墟窮端倪而盡變化其樂不至耶今爾苟容於蹄涔之間惟沙泥之是據惟蛭螾之與徒率乎嗜好以希飲食之餘是同吾之形異吾之樂者也狎於人啗其利者扼其喉胾其肉可以立待吾方哀而援之以手又何誘吾納之陷穽耶爾不免矣野龍行未幾果為夏后氏之醢漢三髙士贊前漢一人王覇仲儒清節是理有息躬耕黃頭歴齒故人令狐奉書遣子從以車徒入耀閭里旣往覇卧日呉不起其妻訊之以息愧恥君遁世榮抗節不仕子親耒耜固其宜矣我實信道曷足慚彼覇乃欣然恬淡如始夫髙婦賢可謂具美後漢二人摰先生恂伯陵之孫學通五經居於渭濵弟子累百馬融服勤以子妻之師而益親融為大儒恂乃知之和帝之世公卿以聞季直才器宜當輔臣公車就徴禮備𤣥纁守道不至終為逸民外黃申屠少負名節義女報讐令欲論殺蟠以同縣陳情上讞廷尉宥之旌彼孝烈慱通羣書復善談說漢衰政荒時實暮末隱於碭山遂與世絶獻帝即位徴為三公邈若不應㝠㝠一鴻時人賢之重者蔡邕明哲終始嗟乎子龍兩觀銘兩觀雉門雖僭天子聖人在朝姦佞誅死姦首擲地姦血如水政不得亂國是以理下及千祀澆風四起内荏外賢舉世稱美􅀢奕皇都象魏天倚豈無姧邪佩玉蕋蕋聖人弗生兩觀如砥以石鑱辭著於闕里卜肆銘蜀嚴之託蓍龜也以忠孝仁義後來之託蓍龜也以媮佞險詖美之使怡愉怛之使駭畏小人惟惡是嗜惟禍是避惟福是覬惟蠱是媚曽不究得失之所自故幽贊之蓍前列之龜乃化為庸妄之器嗚呼成都吾不知古為市之地況君平之卜肆耶強為之銘以刻其意陋巷銘魯國千乘豈無康逵傳載陋巷以顔居之鄙委側僻樞桑覆茨簞瓢屢空其樂怡怡聖人之言終日不違易贊獨入云顔庶㡬門直大道堂如翬飛梁肉在御狼貪豕肥陋巷相去不其逺而我實狂狷蓬蒿所宜勒於柴荆賢哉是思馬當山銘言天下之險者在山曰太行在水曰吕梁合二險而為一吾又聞乎馬當彼之為險也屹於大江之旁恠石憑怒跳波發狂日黯風助摧牙折檣血和蛟涎骨橫魚吭幸而脫死神魂飛揚殊不知堅輪蹄者夷於太行仗忠信者通乎吕梁便舟檝者行於馬當合是三險而為一未敵小人方寸之包藏外若韋脂中如劒鋩蹈席必死鈎𠢐必傷在古己極於今益昌敬篆巖石俾民勿亡書銘太古之時何當有欺逮乎結繩民始相疑畫卦造書聖人之為圖載文字厥功弗知惟簡惟牘斷竹扸木累必充庭負必折轂韋編一絶錯亂名目寖務輕去聲省搗枲剥榖膠綴畨畨恣其所便䖝篆更𨽻形模易宣上下今古巻舒蟬聨薫曝蠧鬱疵乎不堅又取珉石篆琢雕鐫由簡牘下其存四􅂒璽印章號殷勤識音志焉其巧益甚其說益繁盟契質要朝成夕反平聲誥誓制令尾違首言牋檄奏報離方就圓傳録註記醜讐美憐銘誄碑表虚功妄賢歌詩賦頌多思諂權在簡牘者埋沒爛壊無遺一編副以枲榖其留㝡延繆戾倒顛尨䝉弗刪在珉石者固寵納賂惟辭是妍鑱鑿既畢名聲泯然堯舜之道以人為傳有死必繼流乎億年宜斥註偽焚燒弃捐復似太古結繩之前耒耜經耒耜者古聖人之作也自乃粒以來至於今生民賴之有天下國家者去此無有也飽食安坐曽不求命稱之義非揚子所謂如禽者耶余在田野間一日呼耕甿就而數其目恍若登農皇之庭受播種之法淳淳冷冷聳堅毛髪然後知聖人之㫖趣樸乎其深哉孔子謂吾不如老農信也因書為耒耜經以備遺忘且無愧於食經曰耒耜農書之言也民之習通謂之犂冶金而為之者曰犂鏡本作鑱曰犂壁斵木而為之者曰犂底曰壓鑱曰􅀢額曰犂箭曰犂轅曰犂梢曰犂評去曰犂建曰犂槃木與金凡十有一事耕之土曰墢墢猶塊也起其墢者鑱也覆其墢者壁也草之生必布於墢不覆之則無以絶其本根故鑱引而居下壁偃而居上鑱表上利壁形其圓負鑱者曰底底初實於鑱中工謂之鼈肉底之次曰壓鑱背有二孔係於壓鑱之兩旁鑱之次曰􅀢額言其可以扞其壁也皆䝯然相戴自􅀢額達於犂底縱而貫之曰箭前如桯而樛者曰轅後如柄而髙者曰梢轅有越加箭可㢮張焉轅之上又有如槽形亦如箭焉刻為級前髙而後庳所以進退曰評進之則箭下入土也淺以其上下類激射故曰箭以其淺深類可否故曰評評之上曲而衡之者曰建建揵也所以柅其轅與評無是則二物躍而出箭不能止横於轅之前末曰槃言可轉也左右繫以樫乎軛也轅之後末乎梢中在手所以執耕者也轅車之匈梢取舟之尾止乎此乎鑱長一尺四寸廣六寸壁廣長皆尺微椭音墮底長四尺廣四寸評底過壓鑱二尺䇿減壓鑱四寸廣狹與底同箭髙三尺評尺有三寸槃増評尺七焉建惟稱絶轅修九尺梢得其半轅至梢中間掩四尺犂之終始丈有二耕而後有􅐡去渠疎之義也散墢去芟者焉􅐡而後有礰呼格反礋宅焉有磟碡音鹿毒焉自􅐡至礰礋皆有齒磟碡觚稜而已咸以木為之堅而重者良江東之田器盡於是耒耜經終焉迎潮送潮辭并序余耕稼所在松江南旁田廬門外有溝通浦溆而朝夕之潮至焉天弗雨則軋而留之用以滌濯灌溉及物之功甚鉅其羸壯遲速繫望晦盈虛也用之則順而進捨之則黜而退有類乎君子之道翫而感之作迎潮送潮二辭聊寄聲於騷人之末云江霜嚴兮楓葉丹潮聲髙兮墟落寒鷗巢卑兮漁箔短逺岸沒兮光爛爛潮之德兮無際既充其大兮又充其細沒幽岸兮欵柴門寂寞流連兮依稀舊痕濡腴澤槁兮潮之恩不尸其功兮歸於混元右迎潮潮西來兮又東下日染中流兮紅灑灑汀葭蒼兮嶼蓼枯風騷牢兮愁烟已孤大㡬望兮微将晦翳睨瀛溶兮斂然而退愛長波兮數數一幅巾兮無纓可濯帆生塵兮檝有衣悵潮之還兮吾猶未歸右送潮憶白菊稚子書傳白菊開西成相滯未容廻月明階下忩紗薄多少清香透入来閑吟閑吟料得三更盡始把孤燈背竹忩一夜西風髙浪起不教歸夢過寒江笠澤藂書巻三
